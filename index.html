<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>EICHHORN PERFORMANCE – Trainer Tool</title>
  <link rel="stylesheet" href="style.css">
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
</head>
<body>

  <header id="main-header">
    <img src="Firmenlogo.png" alt="Logo" class="logo-img-main" id="logo-dashboard">
    <button id="logout-btn" class="btn-outline">Logout</button>
  </header>

  <main>
    <!-- LOGIN -->
    <section id="login-view">
      <div class="center logo-login">
        <img src="Firmenlogo.png" alt="Logo" class="logo-img-login">
      </div>
      <div class="login-box">
        <input id="login-username" placeholder="Benutzername" value="trainer">
        <input id="login-password" type="password" placeholder="Passwort" value="1234">
        <button id="login-btn" class="btn-primary">Login</button>
        <div id="login-error" class="error hidden"></div>
      </div>
    </section>

    <!-- Dashboard -->
    <section id="dashboard-view" class="hidden">
      <h2>Dashboard</h2>
      <div class="dash-buttons">
        <button id="btn-customers" class="btn-primary">👤 Kunden</button>
        <button id="btn-calendar" class="btn-primary">📅 Kalender</button>
        <button id="btn-new-session" class="btn-primary">🏋️ Neue Einheit</button>
      </div>
      <div id="birthday-info" class="birthday-box"></div>
    </section>

    <!-- Kundenbereich -->
    <section id="customers-view" class="hidden">
      <button class="back-btn btn-outline" type="button" style="margin-bottom:12px;">⬅️ Zurück</button>
      <h2>👤 Kunden</h2>
      <div class="customers-top">
        <input id="customer-search" placeholder="Suche...">
        <button id="new-customer-btn" class="btn-primary">Neue KundIn</button>
      </div>
      <div id="customers-hint" class="hint hidden"></div>
      <div class="customers-layout">
        <ul id="customer-list" class="customer-list"></ul>
        <div class="customer-right">
          <div id="customer-empty">Bitte KundIn auswählen.</div>
          <div id="customer-detail" class="hidden">
               <h3 id="detail-name" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <span id="customer-name-text"></span>
              <button id="edit-customer-btn" class="icon-btn" title="Bearbeiten" style="font-size:1em;line-height:1;">✏️</button>
              <button id="delete-customer-btn" class="icon-btn" title="Löschen" style="font-size:1em;line-height:1;color:#c00;">🗑️</button>
            </h3>
            <div id="customer-stammdaten" class="hidden">
              <p><strong>Geburtstag:</strong> <span id="detail-dob"></span></p>
              <p><strong>Adresse:</strong> <span id="detail-address"></span></p>
              <p><strong>Telefon:</strong> <span id="detail-phone"></span></p>
              <p><strong>Email:</strong> <span id="detail-email"></span></p>
            </div>
            <div class="customer-actions">
              <button id="new-session-btn" class="btn-primary">🏋️ Neue Einheit</button>
            </div>
            <div id="history-block">
              <h4>Trainingseinheiten</h4>
              <ul id="session-list"></ul>
            </div>
          </div>
          <div id="customer-form-wrapper" class="hidden">
            <h3 id="customer-form-title"></h3>
            <form id="customer-form">
              <input id="cust-id" type="hidden">
              <input id="cust-firstname" placeholder="Vorname">
              <input id="cust-lastname" placeholder="Nachname">
              <label>Geburtstag:
                <input id="cust-dob" type="date">
              </label>
              <input id="cust-street" placeholder="Straße">
              <input id="cust-zip" placeholder="PLZ">
              <input id="cust-city" placeholder="Ort">
              <input id="cust-phone" placeholder="Telefon">
              <input id="cust-email" placeholder="Email">
              <div class="form-actions">
                <button type="submit" class="btn-primary">Speichern</button>
                <button type="button" id="cancel-customer-form" class="btn-outline">Abbrechen</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- SESSION VIEW -->
    <section id="session-view" class="hidden">
      <button class="back-btn btn-outline" type="button" style="margin-bottom:12px;">⬅️ Zurück</button>
      <h2 id="session-view-title"></h2>
      <form id="session-form">
        <div id="session-customer-block" class="hidden" style="margin-bottom:9px;">
          <label>Kunde: 
            <select id="session-customer-dropdown"></select>
          </label>
        </div>
        <label>Datum:
          <input id="session-date" type="date">
        </label>
        <label>Notizen:
          <textarea id="session-notes" rows="4"></textarea>
        </label>
        <label>Trainingsplan:
          <textarea id="session-plan" rows="6"></textarea>
        </label>
        <button type="submit" class="btn-primary">Speichern</button>
      </form>
    </section>

    <!-- SESSION MODAL -->
    <div id="session-modal" class="hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h3>Trainingseinheit bearbeiten</h3>
        <form id="session-edit-form">
          <input id="edit-session-id" type="hidden">
          <label>Datum:
            <input id="edit-session-date" type="date">
          </label>
          <label>Notizen:
            <textarea id="edit-session-notes" rows="4"></textarea>
          </label>
          <label>Trainingsplan:
            <textarea id="edit-session-plan" rows="6"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Speichern</button>
            <button type="button" id="delete-session-btn" class="btn-danger">Löschen</button>
            <button type="button" id="cancel-session-edit" class="btn-outline">Abbrechen</button>
          </div>
        </form>
      </div>
    </div>

    <!-- KALENDER -->
    <section id="calendar-view" class="hidden">
      <button class="back-btn btn-outline" type="button" style="margin-bottom:12px;">⬅️ Zurück</button>
      <h2>📅 Kalender</h2>
      <button id="add-appt-btn" class="btn-primary" style="margin: 10px 0 16px 0;">➕ Termin eintragen</button>
      <div class="cal-header">
        <button id="cal-prev" class="btn-outline">◀</button>
        <span id="cal-label"></span>
        <button id="cal-next" class="btn-outline">▶</button>
      </div>
      <div id="cal-days" class="calendar-grid"></div>
      <h3 id="day-title">Tag auswählen</h3>
      <div id="day-appointments"></div>
    </section>

    <!-- TERMIN MODAL (Kalender-Eintrag) -->
    <div id="appt-modal" class="hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h3>Termin eintragen</h3>
        <form id="appt-modal-form">
          <select id="appt-modal-customer"></select>
          <input id="appt-modal-start" type="time" required>
          <input id="appt-modal-end" type="time" required>
          <textarea id="appt-modal-note" rows="2" placeholder="Notiz"></textarea>
          <div class="form-actions">
            <button type="submit" class="btn-primary">Speichern</button>
            <button type="button" id="appt-modal-cancel" class="btn-outline">Abbrechen</button>
          </div>
        </form>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
